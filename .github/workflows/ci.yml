name: ci

on:
  push:
    branches: [main, master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: fmt · clippy · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain
        run: |
          rustup show active-toolchain   # installs the version pinned in rust-toolchain.toml
          rustup component add rustfmt clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Test
        run: cargo test --all-features

  xcframework:
    name: build xcframework (apple)
    runs-on: macos-14
    needs: rust
    steps:
      - uses: actions/checkout@v4
      - name: Install Apple targets
        run: rustup target add aarch64-apple-ios aarch64-apple-ios-sim x86_64-apple-ios
      - uses: Swatinem/rust-cache@v2
      - name: Build XCFramework
        run: ./build/build-xcframework.sh
